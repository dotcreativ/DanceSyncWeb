<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanceSync Mobile</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; margin-top: 20px; }
        #status { margin-top: 20px; font-weight: bold; color: blue; }
    </style>
</head>
<body>
    <h1>DanceSync</h1>
    <p>Upload your dance video to sync HQ audio</p>
    
    <input type="file" id="videoInput" accept="video/*">
    <br>
    <button onclick="processVideo()">Sync Audio</button>
    
    <p id="status"></p>

    <script>
        async function processVideo() {
            const status = document.getElementById('status');
            const fileInput = document.getElementById('videoInput');
            
            if (fileInput.files.length === 0) {
                alert("Please select a video file.");
                return;
            }

            status.innerText = "Uploading video to server... (this takes a moment)";

            const videoFile = fileInput.files[0];
            const formData = new FormData();
            // Must match backend's request.files['video']
            formData.append('video', videoFile);

            // --- FIXED: Point directly to Render ---
            const backendUrl = 'https://dancesync-backend.onrender.com';

            try {
                // --- FIXED: Use /upload endpoint ---
                const response = await fetch(`${backendUrl}/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    status.innerText = data.message || "Audio extracted!";
                    console.log('Server response:', data);
                } else {
                    status.innerText = "Error extracting audio (Server Error).";
                    console.error('Extraction failed', response.status);
                }
            } catch (err) {
                status.innerText = "Connection failed. Is the backend awake?";
                console.error('Fetch error:', err);
            }
        }
    </script>
</body>
</html>
