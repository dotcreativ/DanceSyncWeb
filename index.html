<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanceSync Mobile</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; text-align: center; padding: 20px; background: #fafafa; }
        .container { max-width: 500px; margin: auto; }
        button { background: #007AFF; color: white; border: none; padding: 12px 24px; border-radius: 20px; font-size: 16px; font-weight: 600; margin-top: 15px; cursor: pointer; }
        #status { margin-top: 20px; font-size: 14px; color: #555; }
        
        /* Timeline Card Styling */
        #resultContainer { display: none; margin-top: 30px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #previewVideo { width: 100%; border-radius: 10px; background: black; }
        .song-card { display: flex; align-items: center; gap: 15px; margin-top: 15px; text-align: left; background: #f8f8f8; padding: 10px; border-radius: 10px; }
        .song-card img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .song-info b { display: block; font-size: 16px; }
        .song-info span { font-size: 14px; color: #666; }
        .offset-badge { background: #E5E5EA; padding: 4px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; color: #007AFF; margin-top: 5px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DanceSync</h1>
        <p>Record your dance, we find the HQ track.</p>
        
        <input type="file" id="videoInput" accept="video/*" style="display:none">
        <button onclick="document.getElementById('videoInput').click()">Select Video</button>
        <br>
        <button id="syncBtn" onclick="processVideo()">Sync Audio</button>
        
        <p id="status"></p>

        <div id="resultContainer">
            <video id="previewVideo" controls></video>
            <div class="song-card">
                <img id="albumArt" src="">
                <div class="song-info">
                    <b id="songTitle">Song Title</b>
                    <span id="songArtist">Artist Name</span>
                    <div id="songOffset" class="offset-badge">Sync: 00:00</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function processVideo() {
            const status = document.getElementById('status');
            const fileInput = document.getElementById('videoInput');
            const resultContainer = document.getElementById('resultContainer');
            
            if (fileInput.files.length === 0) {
                alert("Please select a video file.");
                return;
            }

            status.innerText = "Uploading & Identifying Song...";
            const videoFile = fileInput.files[0];
            
            // Show video preview immediately
            document.getElementById('previewVideo').src = URL.createObjectURL(videoFile);

            const formData = new FormData();
            formData.append('video', videoFile);

            try {
                const response = await fetch('https://dancesync-backend.onrender.com/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.status === 'success') {
                    status.innerText = "Match Found!";
                    resultContainer.style.display = 'block';
                    document.getElementById('songTitle').innerText = data.title;
                    document.getElementById('songArtist').innerText = data.artist;
                    document.getElementById('songOffset').innerText = "Sync Point: " + data.offset;
                    document.getElementById('albumArt').src = data.album_art || 'https://via.placeholder.com/60';
                } else {
                    status.innerText = "Error: " + (data.message || "Could not identify song.");
                }
            } catch (err) {
                status.innerText = "Connection failed. Make sure Render is awake.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
