<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanceSync Mobile</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; text-align: center; padding: 20px; background: #121212; color: white; }
        .container { max-width: 500px; margin: auto; }
        button { background: #1DB954; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; transition: transform 0.2s; }
        button:active { transform: scale(0.95); }
        #status { margin-top: 20px; color: #b3b3b3; }
        #resultContainer { display: none; margin-top: 30px; background: #181818; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        video { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .song-card { display: flex; align-items: center; gap: 15px; text-align: left; background: #282828; padding: 12px; border-radius: 10px; }
        .song-card img { width: 64px; height: 64px; border-radius: 4px; }
        .offset-badge { background: #1DB954; color: black; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-top: 8px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DanceSync</h1>
        <p>Sync high-quality audio to your dance.</p>
        
        <input type="file" id="videoInput" accept="video/*" style="display:none">
        <button onclick="document.getElementById('videoInput').click()">Pick a Video</button>
        <br>
        <button onclick="processVideo()">Sync & Play HQ</button>
        
        <p id="status"></p>

        <div id="resultContainer">
            <video id="previewVideo" playsinline></video>
            <div class="song-card">
                <img id="albumArt" src="">
                <div class="song-info">
                    <b id="songTitle"></b><br>
                    <span id="songArtist" style="color:#b3b3b3"></span><br>
                    <div id="songOffset" class="offset-badge"></div>
                </div>
            </div>
            <button id="playBtn" style="width:100%; margin-top:20px;">▶ Play Synced</button>
        </div>
    </div>

    <script>
        let hqAudio = new Audio();
        let songOffsetSeconds = 0;

        async function processVideo() {
            const status = document.getElementById('status');
            const videoFile = document.getElementById('videoInput').files[0];
            if (!videoFile) return alert("Select a video!");

            status.innerText = "Processing on server...";
            const formData = new FormData();
            formData.append('video', videoFile);
            document.getElementById('previewVideo').src = URL.createObjectURL(videoFile);

            try {
                const response = await fetch('https://dancesync-backend.onrender.com/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.status === 'success') {
                    status.innerText = "Ready to Sync!";
                    document.getElementById('resultContainer').style.display = 'block';
                    document.getElementById('songTitle').innerText = data.title;
                    document.getElementById('songArtist').innerText = data.artist;
                    document.getElementById('albumArt').src = data.album_art;
                    document.getElementById('songOffset').innerText = "Offset: " + data.offset;
                    
                    // Logic to convert "00:12" to seconds
                    const parts = data.offset.split(':');
                    songOffsetSeconds = (+parts[0]) * 60 + (+parts[1]);
                    
                    hqAudio.src = data.preview_url;
                    
                    document.getElementById('playBtn').onclick = () => {
                        const video = document.getElementById('previewVideo');
                        video.muted = true; // Mute original video
                        video.currentTime = 0;
                        hqAudio.currentTime = songOffsetSeconds; // Start music at the right spot
                        
                        video.play();
                        hqAudio.play();
                    };
                }
            } catch (err) {
                status.innerText = "Error: " + err;
            }
        }
    </script>
</body>
</html>
