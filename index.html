<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanceSync Mobile</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background: #121212; color: white; }
        .container { max-width: 500px; margin: auto; }
        button { background: #1DB954; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        input[type="text"] { width: 80%; padding: 10px; border-radius: 10px; border: none; margin-top: 10px; }
        #status { margin-top: 20px; color: #b3b3b3; }
        #resultContainer, #manualSearch { display: none; margin-top: 30px; background: #181818; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        video { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DanceSync</h1>
        <input type="file" id="videoInput" accept="video/*" style="display:none">
        <button onclick="document.getElementById('videoInput').click()">Pick a Video</button>
        <button onclick="processVideo()">Auto Sync</button>
        <p id="status"></p>

        <div id="manualSearch">
            <p>We couldn't recognize the song. Type it below:</p>
            <input type="text" id="ytQuery" placeholder="Song name & Artist">
            <button onclick="ytSearch()">Find on YouTube</button>
        </div>

        <div id="resultContainer">
            <video id="previewVideo" playsinline controls></video>
            <div id="songDetails"></div>
            <button id="playBtn" style="width:100%; margin-top:20px;">▶ Play Synced</button>
        </div>
    </div>

    <script>
        let hqAudio = new Audio();

        async function processVideo() {
            const status = document.getElementById('status');
            const file = document.getElementById('videoInput').files[0];
            if(!file) return alert("Select video");

            status.innerText = "Analyzing audio...";
            const formData = new FormData();
            formData.append('video', file);
            document.getElementById('previewVideo').src = URL.createObjectURL(file);

            const response = await fetch('https://dancesync-backend.onrender.com/upload', { method: 'POST', body: formData });
            const data = await response.json();

            if (data.status === 'success') {
                showResult(data);
            } else {
                status.innerText = "Automatic match failed.";
                document.getElementById('manualSearch').style.display = 'block';
            }
        }

        function showResult(data) {
            document.getElementById('resultContainer').style.display = 'block';
            document.getElementById('songDetails').innerHTML = `<b>${data.title}</b><br>${data.artist}`;
            hqAudio.src = data.preview_url;
            // ... (Playback logic remains same as previous version)
        }
    </script>
</body>
</html>
