<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanceSync Pro</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background: #000; color: #fff; }
        .container { max-width: 400px; margin: auto; }
        .btn { background: #fff; color: #000; border: none; padding: 18px; border-radius: 40px; font-weight: bold; margin-top: 15px; width: 100%; font-size: 16px; cursor: pointer; display: block; }
        .btn-download { background: #00FF7F; margin-top: 10px; display: none; }
        #status { margin-top: 25px; color: #888; font-size: 12px; text-transform: uppercase; }
        #result { display: none; margin-top: 20px; }
        video { width: 100%; border-radius: 20px; background: #111; }
        .song-card { display: flex; align-items: center; gap: 15px; background: #111; padding: 15px; border-radius: 15px; margin: 15px 0; text-align: left; }
        .song-card img { width: 50px; height: 50px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DanceSync</h1>
        <input type="file" id="videoInput" accept="video/*" style="display:none">
        <button class="btn" onclick="document.getElementById('videoInput').click()">SELECT VIDEO</button>
        <button class="btn" style="background:#222; color:#fff" onclick="processVideo()">SYNC AUDIO</button>
        
        <p id="status"></p>

        <div id="result">
            <video id="previewVideo" playsinline controls></video>
            <div class="song-card">
                <img id="albumArt" src="">
                <div>
                    <b id="songTitle"></b><br>
                    <span id="songArtist" style="color:#666"></span>
                </div>
            </div>
            <button class="btn" id="playBtn">PREVIEW SYNC</button>
            <button class="btn btn-download" id="downloadBtn">DOWNLOAD VIDEO</button>
        </div>
    </div>

    <script>
        let currentData = null;

        async function processVideo() {
            const status = document.getElementById('status');
            const file = document.getElementById('videoInput').files[0];
            if(!file) return;

            status.innerText = "Processing... (This takes 30-60s)";
            const formData = new FormData();
            formData.append('video', file);

            try {
                const response = await fetch('https://dancesync-backend.onrender.com/upload', { method: 'POST', body: formData });
                currentData = await response.json();

                if (currentData.status === 'success') {
                    status.innerText = "Matched!";
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('downloadBtn').style.display = 'block';
                    document.getElementById('songTitle').innerText = currentData.title;
                    document.getElementById('songArtist').innerText = currentData.artist;
                    document.getElementById('albumArt').src = currentData.album_art;
                    document.getElementById('previewVideo').src = URL.createObjectURL(file);
                }
            } catch (e) { status.innerText = "Error!"; }
        }

        document.getElementById('downloadBtn').onclick = async () => {
            const status = document.getElementById('status');
            status.innerText = "Building your HQ video...";
            
            const response = await fetch('https://dancesync-backend.onrender.com/merge', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    preview_url: currentData.preview_url,
                    offset: currentData.offset
                })
            });

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "DanceSync_HQ.mp4";
            document.body.appendChild(a);
            a.click();
            status.innerText = "Downloaded!";
        };
    </script>
</body>
</html>
